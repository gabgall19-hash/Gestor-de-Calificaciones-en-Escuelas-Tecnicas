name: Google Drive Backup

on:
  push:
    branches:
      - main

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip project
        run: |
          # Creamos un zip excluyendo carpetas pesadas o innecesarias
          zip -r backup.zip . -x "node_modules/*" ".git/*" ".wrangler/*" "dist/*" ".gemini/*" "voice-project-*.json"

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@v2
        with:
          credentials: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          filename: backup.zip
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: false
